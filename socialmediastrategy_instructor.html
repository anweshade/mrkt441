<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRKT 441 — Projector</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;color:#1a1a2e;font-family:'DM Sans',sans-serif;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.5rem;background:#fff;border-bottom:2px solid #e2dfd8;flex-wrap:wrap;gap:10px}
.title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#5b4fe8}
.sub{font-size:11px;color:#6b6b8a;margin-top:1px}
.tabs{display:flex;gap:4px;background:#f5f4f0;border-radius:10px;padding:4px;border:1.5px solid #e2dfd8}
.tab{padding:7px 14px;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;border:none;background:none;color:#6b6b8a;font-family:'DM Sans',sans-serif;transition:all .2s}
.tab.on{background:#5b4fe8;color:#fff}
.timer{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;cursor:pointer;padding:6px 16px;border-radius:10px;background:#f5f4f0;border:2px solid #e2dfd8;color:#1a1a2e;min-width:88px;text-align:center;user-select:none}
.timer.run{color:#0d9e7a;border-color:#0d9e7a;background:#e4f7f1}
.timer.warn{color:#c47f0a;border-color:#c47f0a;background:#fef6e4;animation:pulse 1s infinite}
.timer.done{color:#dc2626;border-color:#dc2626;background:#fef2f2}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.live{font-size:12px;font-weight:600;color:#dc2626;display:flex;align-items:center;gap:5px}
.live.on{color:#0d9e7a}
.dot{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
.live.on .dot{animation:none}

/* SCOREBOARD */
.sboard{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:10px 1rem;background:#fff;border-bottom:2px solid #e2dfd8}
.scard{background:#f5f4f0;border:2px solid #e2dfd8;border-radius:10px;padding:10px 6px;text-align:center;position:relative;transition:all .3s;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.scard.lead{border-color:#c47f0a;background:#fef6e4}
.scard.sub{border-color:#5b4fe8;background:#eeecfe}
.crown{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:16px}
.sg{font-size:10px;font-weight:700;color:#6b6b8a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.sname{font-size:10px;color:#1a1a2e;font-weight:600;margin-bottom:3px;line-height:1.3;word-wrap:break-word;overflow-wrap:break-word;white-space:normal;max-width:100%}
.spts{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#5b4fe8;line-height:1}
.sbadge{font-size:9px;color:#5b4fe8;font-weight:700;margin-top:2px}
.sadj{display:flex;justify-content:center;gap:4px;margin-top:6px}
.sadj button{width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:15px;font-weight:700;border:1.5px solid #e2dfd8;background:#fff;color:#6b6b8a;line-height:1;transition:all .15s}
.sadj button.p:hover{background:#5b4fe8;color:#fff;border-color:#5b4fe8}
.sadj button.m:hover{background:#dc2626;color:#fff;border-color:#dc2626}

/* MAIN */
.main{padding:1.25rem 1.5rem}
.slabel{font-size:11px;font-weight:700;color:#6b6b8a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-family:'Syne',sans-serif}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.bcard{border:2px solid #e2dfd8;border-radius:10px;padding:.875rem;cursor:pointer;background:#fff;transition:all .2s}
.bcard:hover{border-color:#5b4fe8;transform:translateY(-1px)}
.bcard.on{border:2px solid #5b4fe8;background:#eeecfe}
.bcard.got{border-color:#0d9e7a;background:#e4f7f1}
.bcard.fast{border-color:#c47f0a}
.bnum{font-size:10px;font-weight:700;color:#6b6b8a;text-transform:uppercase;margin-bottom:3px}
.bname{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#1a1a2e}
.bstat{font-size:11px;margin-top:3px;color:#6b6b8a}
.bstat.ok{color:#0d9e7a;font-weight:700}
.bstat.fast{color:#c47f0a;font-weight:700}
.canvas{border:2px solid #e2dfd8;border-radius:12px;overflow:hidden;background:#fff}
.chead{background:#5b4fe8;padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center}
.cgnum{font-size:11px;color:rgba(255,255,255,.75);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.cbname{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff}
.ctagline{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px}
.spdbadge{background:#c47f0a;color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px}
.cbrief{padding:1rem 1.25rem;background:#f0eeea;border-bottom:2px solid #e2dfd8}
.cpara{font-size:13px;line-height:1.75;color:#3a3a55;margin-bottom:8px}
.ctags{display:flex;flex-wrap:wrap;gap:6px}
.ctag{font-size:11px;background:#fff;color:#6b6b8a;padding:3px 10px;border-radius:20px;border:1px solid #e2dfd8}
.cfields{display:grid;grid-template-columns:1fr 1fr}
.cfield{padding:.875rem 1.1rem;border-right:1.5px solid #e2dfd8;border-bottom:1.5px solid #e2dfd8;background:#fff}
.cfield:nth-child(even){border-right:none}
.cflbl{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.cval{font-size:14px;line-height:1.65;color:#1a1a2e;min-height:48px;white-space:pre-wrap}
.cempty{font-size:13px;color:#c5c3bb;font-style:italic}
.cnav{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1.25rem;background:#f0eeea;border-top:2px solid #e2dfd8;flex-wrap:wrap;gap:8px}
.cnav-r{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
button.nb{font-size:12px;padding:7px 12px;border:1.5px solid #e2dfd8;border-radius:7px;cursor:pointer;background:#fff;color:#6b6b8a;font-family:'DM Sans',sans-serif;font-weight:500}
button.nb:hover{border-color:#5b4fe8;color:#5b4fe8}
button.pb{font-size:12px;padding:7px 14px;border:none;border-radius:7px;cursor:pointer;background:#5b4fe8;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600}
button.gb{font-size:12px;padding:7px 14px;border:none;border-radius:7px;cursor:pointer;background:#16a34a;color:#fff;font-family:'DM Sans',sans-serif;font-weight:700}
button.ob{font-size:12px;padding:7px 14px;border:none;border-radius:7px;cursor:pointer;background:#e05a3a;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600}
.empty{text-align:center;padding:2.5rem;font-size:14px;color:#6b6b8a;border:2px dashed #e2dfd8;border-radius:12px;background:#fff}

/* VOTE */
.info-bar{background:#fff;border:1.5px solid #e2dfd8;border-radius:10px;padding:.875rem 1.1rem;font-size:13px;color:#6b6b8a;margin-bottom:1rem}
.info-bar strong{color:#1a1a2e}
.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.vbtn{padding:.875rem;border:2px solid #e2dfd8;border-radius:10px;cursor:pointer;background:#fff;font-size:14px;font-weight:600;color:#1a1a2e;text-align:center;font-family:'DM Sans',sans-serif;transition:all .2s}
.vbtn:hover{border-color:#5b4fe8;transform:translateY(-1px)}
.vbtn.voted{border-color:#5b4fe8;background:#eeecfe;color:#5b4fe8}
.vrow{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.vlbl{font-size:13px;font-weight:600;min-width:72px}
.vbar{flex:1;height:10px;background:#f0eeea;border-radius:5px;overflow:hidden;border:1px solid #e2dfd8}
.vfill{height:100%;background:#5b4fe8;border-radius:5px;transition:width .4s}
.vnum{font-size:12px;color:#6b6b8a;min-width:20px;text-align:right}
.steal{border:2px solid #e05a3a;border-radius:12px;overflow:hidden;margin-top:1rem}
.steal-head{background:#e05a3a;color:#fff;padding:.75rem 1.1rem;font-size:13px;font-weight:700;font-family:'Syne',sans-serif}
.steal-body{padding:1rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#fff}
.steal-body select{padding:7px 10px;font-size:13px;border:1.5px solid #e2dfd8;border-radius:7px;background:#f5f4f0;color:#1a1a2e;font-family:'DM Sans',sans-serif}
.pts-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* BONUS */
.bcard2{border:2px solid #fca5a5;border-radius:14px;overflow:hidden;margin-bottom:1rem}
.bhead{background:#dc2626;color:#fff;padding:.875rem 1.25rem;font-size:15px;font-weight:800;font-family:'Syne',sans-serif;display:flex;justify-content:space-between;align-items:center}
.bbody{padding:1.25rem;background:#fff}
.bq{font-size:20px;font-weight:700;font-family:'Syne',sans-serif;color:#1a1a2e;line-height:1.55;margin-bottom:1rem}
.bopts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.bopt{padding:1rem;border:2px solid #e2dfd8;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:#1a1a2e;background:#f5f4f0;text-align:left;line-height:1.4;font-family:'DM Sans',sans-serif;transition:all .2s}
.bopt:hover:not(:disabled){border-color:#5b4fe8;background:#eeecfe}
.bopt.correct{border-color:#16a34a;background:#edfaf3;color:#16a34a}
.bopt.wrong{border-color:#dc2626;background:#fef2f2;color:#dc2626}
.bopt:disabled{cursor:default}
.bnote{font-size:13px;color:#6b6b8a;line-height:1.7;padding:1rem;background:#f5f4f0;border-radius:8px;border-left:3px solid #5b4fe8}
.bnav{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.qcount{font-size:13px;color:#6b6b8a;margin-right:auto}

/* DISCUSSION */
.dlist{display:flex;flex-direction:column;gap:8px}
.dq{border:2px solid #e2dfd8;border-radius:12px;overflow:hidden;background:#fff;transition:border .2s}
.dq.on{border-color:#5b4fe8}
.dqhead{display:flex;align-items:flex-start;gap:10px;padding:1rem 1.1rem;cursor:pointer;transition:background .15s}
.dqhead:hover{background:#f5f4f0}
.dqtag{flex-shrink:0;font-size:10px;font-weight:800;padding:3px 9px;border-radius:5px;margin-top:2px;text-transform:uppercase;letter-spacing:.05em;font-family:'Syne',sans-serif}
.dqtext{flex:1;font-size:14px;font-weight:500;line-height:1.6;color:#1a1a2e}
.dqarrow{font-size:18px;color:#6b6b8a;flex-shrink:0;display:inline-block;transition:transform .2s}
.dqbody{border-top:2px solid #e2dfd8}
.bigq{padding:1.75rem 2rem;border-bottom:2px solid #e2dfd8;background:#eeecfe}
.bqeye{font-size:10px;font-weight:700;color:#5b4fe8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;font-family:'Syne',sans-serif}
.bqtext{font-size:22px;font-weight:800;font-family:'Syne',sans-serif;line-height:1.6;color:#1a1a2e}
.nwrap{padding:1rem 1.25rem;display:flex;gap:14px;border-bottom:2px solid #e2dfd8;background:#f5f4f0}
.nlbl{font-size:10px;font-weight:700;color:#c47f0a;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;padding-top:2px;font-family:'Syne',sans-serif}
.ntext{font-size:13px;color:#6b6b8a;line-height:1.65}
.dact{padding:.875rem 1.1rem;background:#fff;font-size:11px;color:#6b6b8a}

/* RESET */
.resetbar{padding:.75rem 1.5rem;border-top:2px solid #e2dfd8;background:#fff;display:flex;justify-content:flex-end}
button.resetbtn{font-size:12px;padding:6px 14px;border:2px solid #fca5a5;border-radius:7px;cursor:pointer;background:#fff;color:#dc2626;font-family:'DM Sans',sans-serif;font-weight:600}
button.resetbtn:hover{background:#fef2f2}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="title">Social Media Strategy Game</div>
    <div class="sub"><span id="live-label" class="live"><span class="dot"></span>Connecting...</span></div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="setTab('task')">Strategy</button>
    <button class="tab" onclick="setTab('vote')">Vote</button>
    <button class="tab" onclick="setTab('bonus')">Bonus</button>
  </div>
  <div class="timer" id="timer" onclick="toggleTimer()">10:00</div>
</div>

<div class="sboard" id="sboard"></div>
<div class="main" id="screen"></div>
<div class="resetbar"><button class="resetbtn" onclick="resetClass()">Reset for next class</button></div>

<script>
const DB = 'https://social-media-strategy-5ccbb-default-rtdb.firebaseio.com';

const brands = [
  {name:'Groundwork Coffee', tagline:'Regional roaster, big ambitions',
   para:'Groundwork started in a garage in Columbus, Ohio eight years ago. Today they have two cafes and a loyal following built on quality and sustainability. They just secured investment to open eight new locations across the Midwest in 18 months. Problem: outside Columbus, nobody knows them. They must build genuine awareness city by city, on a tight budget with no dedicated marketing team.',
   tags:['Goal: awareness in new cities','Audience: 25-45, urban, values-driven','Budget: limited','No marketing team']},
  {name:'FitNest', tagline:'Online personal training, no gym required',
   para:'FitNest pairs users with certified personal trainers via live video and on-demand workouts. They face fierce competition from Peloton and Apple Fitness. Their edge is real personalisation — every plan is built by a human trainer. Audience: busy professionals 28–42. Critical fact: FitNest has zero physical presence. Social media is their entire storefront.',
   tags:['Goal: grow subscriptions','Audience: 28-42, results-focused','Budget: moderate','Trust must be built online']},
  {name:'Pawprint Rescue', tagline:'Non-profit shelter, zero ad budget',
   para:'Pawprint Rescue is a small non-profit animal shelter in Austin, TX. They take in animals other shelters cannot accommodate and rely on volunteers and donations. Goal this year: double adoptions. The catch — zero budget for paid advertising. Every result must come from organic content and earned goodwill. Their greatest asset: every animal has a story.',
   tags:['Goal: double adoptions','Audience: local community, all ages','Budget: zero — earned only','Small team, limited time']},
  {name:'ThreadLab', tagline:'Sustainable fashion brand going mainstream',
   para:'ThreadLab makes affordable, sustainably produced clothing and has built a cult following among eco-conscious 18–28 year olds. They have strong organic reach on Instagram but have never run paid campaigns. Now they want to expand beyond their niche and reach mainstream fashion shoppers who care less about sustainability and more about style and price. The risk: going too mainstream could alienate their loyal base.',
   tags:['Goal: reach mainstream fashion audience','Audience: 18-35, style-conscious','Budget: moderate — first paid campaign','Risk: losing existing community']},
  {name:'Stackr', tagline:'Personal finance app for first-time earners',
   para:'Stackr is a free budgeting and savings app aimed at 18–25 year olds entering the workforce for the first time. It has 50,000 downloads but very low daily active usage — people download it and then barely open it again. The challenge is not awareness, it is habit formation and re-engagement. Most competitors feel boring and corporate. Stackr wants to feel like a friend, not a bank.',
   tags:['Goal: increase daily active users','Audience: 18-25, first-time earners','Budget: small — startup stage','Challenge: re-engagement not awareness']},
  {name:'The Reel Room', tagline:'Independent cinema fighting for survival',
   para:'The Reel Room is a beloved independent cinema in Nashville with one screen and a fiercely loyal audience of film lovers. Since a large multiplex opened nearby, ticket sales have dropped 35%. They cannot compete on blockbusters so they are leaning into what makes them special — cult classics, director Q&As, themed screening nights, and a craft cocktail bar. No marketing budget to speak of.',
   tags:['Goal: drive ticket sales and loyalty','Audience: 25-45, local film lovers','Budget: near zero','Strength: community and experience']}
];
const allBrands = brands;

const fieldDefs = [
  {key:'f0', label:'Objective', color:'#5b4fe8'},
  {key:'f1', label:'Platform(s)', color:'#0d9e7a'},
  {key:'f2', label:'Content idea', color:'#e05a3a'},
  {key:'f3', label:'Measure success', color:'#c47f0a'}
];

const bonusQs = [
  {q:'A brand posts consistently but Facebook rarely shows content to followers. Most likely reason?',
   opts:['The account is not verified','Facebook penalises corporate posts unless they generate strong engagement','Not enough hashtags','Organic reach only works on Instagram'],
   correct:1, note:'Platforms like Facebook algorithmically limit corporate content in feeds. This is why paid advertising alongside posting is often needed to reach new customers.'},
  {q:'Pawprint Rescue gets a post shared 50,000 times without paying for it. What type of media is this?',
   opts:['Paid media','Owned media','Earned media','Co-created content'],
   correct:2, note:'Earned media is unpaid publicity — shares, press coverage, word of mouth. High upside but cannot be the sole foundation of a strategy.'},
  {q:'FitNest has engagement up 40% but subscriptions are flat. Most likely cause?',
   opts:['Ads shown to wrong audience','Engagement and conversion are different — content entertains but does not drive purchase','Follower count is too low','Posting at wrong time'],
   correct:1, note:'Engagement is necessary but not sufficient for sales. Entertainment content builds equity but utilitarian content — demos, offers, social proof — drives conversion.'},
  {q:'Which metric best measures whether a campaign drives loyalty, not just attention?',
   opts:['Total follower count','Number of impressions','Purchase frequency and repeat conversion rate','Number of likes per post'],
   correct:2, note:'Follower count and impressions measure reach. Loyalty is measured by behaviour — repeat purchases and direct attribution from social to conversion.'},
  {q:'CleanSlate wants to reach Gen Z authentically. Most effective approach?',
   opts:['Polished TV-style ads repurposed for Instagram','User-generated content and influencer partnerships','Curated content from other brands','LinkedIn thought leadership'],
   correct:1, note:'Gen Z is sceptical of corporate messaging. UGC and peer voices carry far more credibility than branded content with this audience.'}
];



let tab='task', openGroup=null, openQ=null, bonusAnswered=null, bonusIdx=0;
let sec=600, running=false, iv=null, firstDone=null;
let votes=[0,0,0,0,0,0], pts=[0,0,0,0,0,0], submissions={}, hasVoted=false;

async function fetchSubmissions() {
  try {
    const r = await fetch(DB + '/submissions.json');
    const data = await r.json();
    const prev = JSON.stringify(submissions);
    submissions = data || {};

    // detect new submissions
    Object.keys(submissions).forEach(i => {
      const idx = parseInt(i);
      if (submissions[i]?.submitted && !JSON.parse(prev)[i]?.submitted) {
        pts[idx] = (pts[idx]||0) + 1;
        if (firstDone === null) { firstDone = idx; pts[idx] += 2; }
      }
    });

    renderBoard();
    if (tab === 'task') renderTask();

    const lbl = document.getElementById('live-label');
    lbl.className = 'live on';
    lbl.innerHTML = '<span class="dot"></span>Live';
  } catch(e) {
    const lbl = document.getElementById('live-label');
    lbl.className = 'live';
    lbl.innerHTML = '<span class="dot"></span>Connecting...';
  }
}

function addPts(i, n) { pts[i] = Math.max(0, pts[i]+n); renderBoard(); }

function renderBoard() {
  const max = Math.max(...pts);
  let h = '';
  for (let i=0; i<6; i++) {
    const lead = pts[i]===max && max>0;
    const sub = submissions[i]?.submitted;
    h += `<div class="scard${lead?' lead':''}${sub&&!lead?' sub':''}">
      ${lead?'<div class="crown">🏆</div>':''}
      <div class="sg">G${i+1}</div>
      <div class="sname">${allBrands[i].name}</div>
      ${sub?'<div class="sbadge">✓ In</div>':''}
      <div class="spts">${pts[i]}</div>
      <div class="sadj">
        <button class="m" onclick="addPts(${i},-1)">−</button>
        <button class="p" onclick="addPts(${i},1)">+</button>
      </div>
    </div>`;
  }
  document.getElementById('sboard').innerHTML = h;
}

function fmt(s) { const m=Math.floor(s/60),sc=s%60; return `${m}:${sc<10?'0':''}${sc}`; }

function setTab(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach(b => b.className='tab');
  ['task','vote','bonus'].forEach((k,i) => { if(k===t) document.querySelectorAll('.tab')[i].className='tab on'; });
  renderScreen();
}

function toggleTimer() {
  if (running) { clearInterval(iv); running=false; }
  else { running=true; iv=setInterval(() => { if(sec>0)sec--; else{clearInterval(iv);running=false;} updateTimer(); }, 1000); }
  updateTimer();
}
function updateTimer() {
  const el = document.getElementById('timer');
  el.textContent = fmt(sec);
  el.className = 'timer' + (sec===0?' done':sec<=120?' warn':running?' run':'');
}

function renderScreen() {
  if (tab==='task') renderTask();
  else if (tab==='vote') renderVote();
  else if (tab==='bonus') renderBonus();
  
}

function renderTask() {
  const s = document.getElementById('screen');
  let h = '<div class="slabel">Click a group card to view their submitted answers</div><div class="bgrid">';
  allBrands.forEach((b,i) => {
    const sub = submissions[i]?.submitted;
    const fast = firstDone===i;
    const act = openGroup===i;
    h += `<div class="bcard${act?' on':''}${sub&&!act?' got':''}${fast?' fast':''}" id="gc${i}">
      <div class="bnum">Group ${i+1}</div>
      <div class="bname">${b.name}</div>
      <div class="bstat${sub?' ok':fast?' fast':''}">${fast?'⚡ Speed!':sub?'✓ Submitted':'Waiting...'}</div>
    </div>`;
  });
  h += '</div>';

  if (openGroup === null) {
    h += '<div class="empty">Select a group card above to view their answers</div>';
  } else {
    const gi = openGroup, b = allBrands[gi];
    const sub = submissions[gi];
    const f = sub?.fields || {};
    h += `<div class="canvas">
      <div class="chead">
        <div>
          <div class="cgnum">Group ${gi+1}</div>
          <div class="cbname">${b.name}</div>
          <div class="ctagline">${b.tagline}</div>
        </div>
        ${firstDone===gi?'<div class="spdbadge">⚡ Speed bonus!</div>':''}
      </div>
      <div class="cbrief">
        <p class="cpara">${b.para}</p>
        <div class="ctags">${b.tags.map(t=>`<span class="ctag">${t}</span>`).join('')}</div>
      </div>
      <div class="cfields">
        ${fieldDefs.map(fd=>`
          <div class="cfield">
            <div class="cflbl" style="color:${fd.color}">${fd.label}</div>
            ${f[fd.key] ? `<div class="cval">${f[fd.key]}</div>` : `<div class="cempty">${sub?'Left blank':'Not submitted yet'}</div>`}
          </div>`).join('')}
      </div>
      <div class="cnav">
        <button class="nb" onclick="openGroup=((${gi}-1)+6)%6;renderScreen()">← Prev</button>
        <div class="cnav-r">
          <button class="nb" onclick="openGroup=(${gi}+1)%6;renderScreen()">Next →</button>
          ${sub?`
            <button class="gb" onclick="addPts(${gi},3);alert('Group ${gi+1} vote win! +3 pts')">Vote win +3</button>
            <button class="pb" onclick="addPts(${gi},2);alert('Group ${gi+1} best content! +2 pts')">Best content +2</button>
          `:'<span style="font-size:12px;color:#c5c3bb">Awaiting submission...</span>'}
        </div>
      </div>
    </div>`;
  }
  s.innerHTML = h;
  allBrands.forEach((b,i) => {
    const el = document.getElementById('gc'+i);
    if (el) el.onclick = () => { openGroup=i; renderTask(); };
  });
}

function renderVote() {
  const s = document.getElementById('screen');
  const total = votes.reduce((a,b)=>a+b,0);
  const winner = total>0 ? votes.indexOf(Math.max(...votes)) : -1;
  let h = `<div class="info-bar">Class votes for the strongest strategy. <strong>Winner gets +3 pts.</strong> Award best content idea bonus below.</div>
  <div class="slabel">Which group had the strongest strategy?</div>
  <div class="vgrid">`;
  for (let i=0;i<6;i++) {
    h += `<button class="vbtn${votes[i]>0?' voted':''}" onclick="castVote(${i})">
      Group ${i+1}<br><span style="font-size:11px;opacity:.7">${allBrands[i].name.split(' ')[0]}</span>
    </button>`;
  }
  h += '</div>';
  if (total>0) {
    h += '<div class="slabel">Live results</div>';
    for (let j=0;j<6;j++) {
      const pct = Math.round((votes[j]/total)*100);
      h += `<div class="vrow"><div class="vlbl">Group ${j+1}</div><div class="vbar"><div class="vfill" style="width:${pct}%"></div></div><div class="vnum">${votes[j]}</div></div>`;
    }
    h += `<div style="display:flex;gap:8px;margin-top:.875rem;flex-wrap:wrap">
      ${winner>=0?`<button class="pb" onclick="awardVote(${winner})">Award Group ${winner+1} vote win (+3 pts)</button>`:''}
      <button class="nb" onclick="resetVotes()">Reset votes</button>
    </div>`;
  }
  h += `<div class="steal"><div class="steal-head">⚡ Challenge steal — successful +2 pts, failed −1 pt</div>
    <div class="steal-body">
      <select id="sf"><option value="">Challenging group...</option>${[0,1,2,3,4,5].map(i=>`<option value="${i}">Group ${i+1}</option>`).join('')}</select>
      <select id="st"><option value="">Target group...</option>${[0,1,2,3,4,5].map(i=>`<option value="${i}">Group ${i+1}</option>`).join('')}</select>
      <button class="gb" onclick="doStealWin()">Steal successful</button>
      <button class="nb" onclick="doStealFail()">Challenge failed (−1)</button>
    </div></div>
  <div style="margin-top:1rem"><div class="slabel">Best content idea bonus (+2 pts)</div>
  <div class="pts-row">${[0,1,2,3,4,5].map(i=>`<button class="gb" onclick="addPts(${i},2);alert('Group ${i+1} best content! +2 pts')">G${i+1} +2</button>`).join('')}</div></div>`;
  s.innerHTML = h;
}

function castVote(i) { if(hasVoted)return; votes[i]++; hasVoted=true; renderVote(); setTimeout(()=>{hasVoted=false;},600); }
function awardVote(i) { addPts(i,3); alert(`Group ${i+1} wins the vote! +3 pts`); resetVotes(); }
function resetVotes() { votes=[0,0,0,0,0,0]; renderVote(); }
function doStealWin() {
  const f=parseInt(document.getElementById('sf').value), t=parseInt(document.getElementById('st').value);
  if(isNaN(f)||isNaN(t)){alert('Select both groups');return;}
  addPts(f,2); addPts(t,-1); alert(`Group ${f+1} steals +2! Group ${t+1} −1.`); renderVote();
}
function doStealFail() {
  const f=parseInt(document.getElementById('sf').value);
  if(isNaN(f)){alert('Select the challenging group');return;}
  addPts(f,-1); alert(`Challenge failed! Group ${f+1} −1 pt.`); renderVote();
}

function renderBonus() {
  const s = document.getElementById('screen');
  const q = bonusQs[bonusIdx];
  let h = `<div class="bnav">
    <span class="qcount">Question ${bonusIdx+1} of ${bonusQs.length} — first correct answer <strong style="color:#c47f0a">+2 pts</strong></span>
    ${bonusIdx>0?`<button class="nb" onclick="bonusIdx--;bonusAnswered=null;renderBonus()">← Prev</button>`:''}
    ${bonusIdx<bonusQs.length-1?`<button class="nb" onclick="bonusIdx++;bonusAnswered=null;renderBonus()">Next →</button>`:''}
  </div>
  <div class="bcard2">
    <div class="bhead"><span>Bonus round</span><span style="font-size:13px;opacity:.85;font-weight:400">First correct answer +2 pts</span></div>
    <div class="bbody">
      <div class="bq">${q.q}</div>
      <div class="bopts">${q.opts.map((o,i)=>{
        let c='bopt';
        if(bonusAnswered!==null) c+=i===q.correct?' correct':bonusAnswered===i?' wrong':'';
        return `<button class="${c}"${bonusAnswered!==null?' disabled':''} onclick="bonusAnswered=${i};renderBonus()">${o}</button>`;
      }).join('')}</div>
      ${bonusAnswered!==null?`
        <div class="bnote">${q.note}</div>
        <div style="margin-top:.875rem">
          <div class="slabel" style="margin-bottom:6px">Award to first group that answered correctly:</div>
          <div class="pts-row">${[0,1,2,3,4,5].map(i=>`<button class="gb" onclick="addPts(${i},2);alert('Group ${i+1} bonus +2 pts!')">G${i+1}</button>`).join('')}</div>
        </div>`:''}
    </div>
  </div>`;
  s.innerHTML = h;
}



async function resetClass() {
  if (!confirm('Reset everything for next class? This wipes all submissions and scores.')) return;
  try {
    await fetch(DB + '/submissions.json', { method:'DELETE' });
    pts=[0,0,0,0,0,0]; votes=[0,0,0,0,0,0];
    firstDone=null; openGroup=null; bonusAnswered=null; bonusIdx=0; openQ=null; submissions={};
    sec=600; running=false; clearInterval(iv); updateTimer();
    renderBoard(); renderScreen();
    alert('Reset complete — ready for next class!');
  } catch(e) { alert('Error resetting. Try again.'); }
}

fetchSubmissions();
setInterval(fetchSubmissions, 3000);
renderBoard();
renderScreen();
updateTimer();
</script>
</body>
</html>
